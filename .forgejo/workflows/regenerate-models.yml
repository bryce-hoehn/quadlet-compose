name: Regenerate Models

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download latest compose-spec.json
        run: curl -o compose-spec.json https://raw.githubusercontent.com/compose-spec/compose-go/refs/heads/main/schema/compose-spec.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install datamodel-code-generator
        run: pip install datamodel-code-generator

      - name: Regenerate models
        run: datamodel-codegen

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet models/compose.py; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Models are up to date ✓"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Models have changed:"
            git diff --stat models/compose.py
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          BRANCH="chore/regenerate-models"
          git config user.name "forgejo[bot]"
          git config user.email "forgejo[bot]@users.noreply.forgejo.org"
          git checkout -b "$BRANCH"
          git add models/compose.py
          git commit -m "chore: regenerate models/compose.py"
          git push origin "$BRANCH"

          curl -X POST \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/pulls" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "chore: regenerate models/compose.py",
              "body": "Auto-generated by the `regenerate-models` workflow.\n\nThe compose-spec JSON schema has changed and the Pydantic models need to be regenerated via `datamodel-codegen`.",
              "head": "'"$BRANCH"'",
              "base": "${{ github.ref_name }}"
            }'

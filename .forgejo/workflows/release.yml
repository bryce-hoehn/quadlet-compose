name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------ #
  # 1. Validate version, bump files, update flake.lock, commit, tag    #
  # ------------------------------------------------------------------ #
  prepare:
    name: Bump version & tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        id: compute_version
        run: |
          VERSION="${{ inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must be in semver format (e.g. 1.2.3), got '$VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version in pyproject.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.compute_version.outputs.version }}\"/" pyproject.toml
          grep -q "version = \"${{ steps.compute_version.outputs.version }}\"" pyproject.toml \
            || { echo "Failed to bump pyproject.toml"; exit 1; }

      - name: Bump version in flake.nix
        run: |
          sed -i "s/version = \".*\";/version = \"${{ steps.compute_version.outputs.version }}\";/" flake.nix
          grep -q "version = \"${{ steps.compute_version.outputs.version }}\"" flake.nix \
            || { echo "Failed to bump flake.nix"; exit 1; }

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Update flake.lock
        run: nix flake lock --update-input nixpkgs

      - name: Commit and push tag
        run: |
          git config user.name "forgejo[bot]"
          git config user.email "forgejo[bot]@users.noreply.forgejo.org"
          git add pyproject.toml flake.nix flake.lock
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: release v${{ steps.compute_version.outputs.version }}"
          fi
          git tag -a "v${{ steps.compute_version.outputs.version }}" -m "Release v${{ steps.compute_version.outputs.version }}"
          git push
          git push --tags

  # ------------------------------------------------------------------ #
  # 2. Build PyInstaller binaries (Linux arm64 & amd64)                #
  # ------------------------------------------------------------------ #
  build-binary:
    name: Build Linux ${{ matrix.arch }} binary
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.prepare.outputs.version }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller --onefile --clean quadlet_compose.py

      - name: Rename binary
        run: |
          mv dist/quadlet_compose dist/quadlet-compose-linux-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quadlet-compose-linux-${{ matrix.arch }}
          path: dist/quadlet-compose-linux-${{ matrix.arch }}

  # ------------------------------------------------------------------ #
  # 3. Build sdist/wheel and publish to PyPI                           #
  # ------------------------------------------------------------------ #
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.prepare.outputs.version }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ------------------------------------------------------------------ #
  # 4. Create Forgejo Release with all artifacts                        #
  # ------------------------------------------------------------------ #
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [prepare, build-binary, publish-pypi]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.prepare.outputs.version }}"

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: Create source archive
        run: |
          git archive --format=zip --prefix="quadlet-compose-${{ needs.prepare.outputs.version }}/" \
            "v${{ needs.prepare.outputs.version }}" \
            -o release-assets/quadlet-compose-${{ needs.prepare.outputs.version }}-source.zip

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > checksums-sha256.txt

      - name: List release assets
        run: ls -la release-assets/

      - name: Create Forgejo Release
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          REPO="${{ github.repository }}"
          API="${{ github.server_url }}/api/v1/repos/$REPO/releases"

          # Create the release
          RELEASE_ID=$(curl -X POST "$API" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"v$VERSION\",
              \"name\": \"v$VERSION\",
              \"body\": \"Release v$VERSION\"
            }" | jq -r '.id')

          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "Error: Failed to create release"
            exit 1
          fi

          echo "Created release $RELEASE_ID"

          # Upload each asset
          for file in release-assets/*; do
            filename=$(basename "$file")
            echo "Uploading $filename..."
            curl -X POST \
              "${{ github.server_url }}/api/v1/repos/$REPO/releases/$RELEASE_ID/assets" \
              -H "Authorization: token $FORGEJO_TOKEN" \
              -F "attachment=@$file" \
              -F "name=$filename"
          done

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "podlet-compose"
version = "0.1.0"
description = "A thin wrapper around podlet that acts as a drop-in for docker/podman-compose"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "pyyaml",
    "rich",
    "ruamel.yaml",
]

[project.scripts]
podlet-compose = "podlet_compose:main"

[tool.setuptools]
py-modules = ["podlet_compose"]
packages = ["compose_cmds", "utils"]

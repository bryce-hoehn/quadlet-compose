name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Run unit tests
        run: nix develop -c pytest -v -m "not integration"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-24.04
    needs: unit-tests

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      # Rootless podman requires setuid helpers from the system (newuidmap,
      # newgidmap)
      - name: Install rootless podman helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y uidmap fuse-overlayfs
          sudo usermod --add-subuids 100000-165535 $(whoami)
          sudo usermod --add-subgids 100000-165535 $(whoami)

      - name: Enable lingering
        run: sudo loginctl enable-linger $(whoami)

      - name: Set up Quadlet directories
        run: |
          mkdir -p ~/.config/containers/systemd
          mkdir -p ~/.config/systemd/user

      - name: Verify podman
        run: |
          nix develop -c podman --version
          nix develop -c podman quadlet --version || echo "podman quadlet not available"

      - name: Run integration tests
        run: nix develop -c pytest -v -m integration --timeout=120

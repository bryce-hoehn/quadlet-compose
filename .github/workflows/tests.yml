name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -v -m "not integration"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install podlet
        run: cargo binstall podlet

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up systemd user session
        run: |
          # Enable lingering so the user systemd instance starts at boot
          loginctl enable-linger $(whoami)

          # Wait for the user systemd instance to be ready
          for i in $(seq 1 10); do
            if systemctl --user status >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Verify the Quadlet generator is available
          echo "Quadlet generator locations:"
          ls -la /usr/lib/systemd/user-generators/ 2>/dev/null || echo "  (no user-generators dir)"
          ls -la /usr/lib/systemd/user-environment-generators/ 2>/dev/null || echo "  (no user-env-generators dir)"

          # Verify podman quadlet support
          podman --version
          which podlet

          # Trigger an initial daemon-reload to warm up generators
          systemctl --user daemon-reload

      - name: Run integration tests
        run: pytest -v -m integration --timeout=120

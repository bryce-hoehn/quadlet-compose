name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Run unit tests
        run: nix develop -c pytest -v -m "not integration"

  integration-tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Config
            test: tests/integration/test_config.py
          - name: Parse Errors
            test: tests/integration/test_parse_error.py
          - name: Up/Down
            test: tests/integration/test_up_down.py

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Install rootless podman helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y uidmap fuse-overlayfs
          sudo usermod --add-subuids 100000-165535 $(whoami)
          sudo usermod --add-subgids 100000-165535 $(whoami)

      - name: Enable lingering
        run: sudo loginctl enable-linger $(whoami)

      - name: Set up Quadlet directories
        run: |
          mkdir -p ~/.config/containers/systemd
          mkdir -p ~/.config/systemd/user

      - name: Verify podman
        run: nix develop -c podman --version

      - name: Set up Nix podman as system podman
        run: |
          # Quadlet-generated service files hardcode /usr/bin/podman.
          # Symlink the Nix podman (and its generator) so everything uses one version.
          nix develop -c bash -c '
            PODMAN_BIN="$(command -v podman)"
            PODMAN_STORE="${PODMAN_BIN%/bin/podman}"
            sudo ln -sf "$PODMAN_BIN" /usr/bin/podman
            GENERATOR="${PODMAN_STORE}/lib/systemd/user-generators/podman-user-generator"
            if [ -x "$GENERATOR" ]; then
              sudo ln -sf "$GENERATOR" /usr/lib/systemd/user-generators/podman-user-generator
              echo "Linked: $PODMAN_BIN -> /usr/bin/podman"
              echo "Linked: $GENERATOR -> /usr/lib/systemd/user-generators/podman-user-generator"
            else
              echo "Linked: $PODMAN_BIN -> /usr/bin/podman"
              echo "WARNING: podman-user-generator not found at $GENERATOR"
            fi
          '

      - name: Warm up rootless podman
        run: podman ps > /dev/null 2>&1 || true

      - name: Run tests
        run: nix develop -c pytest -v -m integration ${{ matrix.test }} --timeout=120

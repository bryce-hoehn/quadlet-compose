name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Run unit tests
        run: nix develop -c pytest -v -m "not integration"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-24.04
    needs: unit-tests

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Set up Quadlet directories
        run: |
          mkdir -p ~/.config/containers/systemd
          mkdir -p ~/.config/systemd/user

      - name: Verify podman and quadlet
        run: nix develop -c bash -c "podman --version && podman quadlet list"

      - name: Run integration tests
        run: nix develop -c pytest -v -m integration --timeout=120

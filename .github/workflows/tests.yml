name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Run unit tests
        run: nix develop -c pytest -v -m "not integration"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-24.04
    needs: unit-tests

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      # Rootless podman requires setuid helpers from the system (newuidmap,
      # newgidmap)
      - name: Install rootless podman helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y uidmap fuse-overlayfs
          sudo usermod --add-subuids 100000-165535 $(whoami)
          sudo usermod --add-subgids 100000-165535 $(whoami)

      - name: Enable lingering
        run: sudo loginctl enable-linger $(whoami)

      - name: Set up Quadlet directories
        run: |
          mkdir -p ~/.config/containers/systemd
          mkdir -p ~/.config/systemd/user

      - name: Set up Quadlet systemd generator
        run: |
          # Nix installs the generator in /nix/store/.../lib/systemd/user-generators/,
          # but systemd only looks in ~/.config/systemd/user-generators/ (and a few
          # system paths).  Symlink it so `systemctl --user daemon-reload` can find it.
          mkdir -p ~/.config/systemd/user-generators/
          GENERATOR="$(find /nix/store -maxdepth 4 -name 'podman-system-generator' -type f 2>/dev/null | head -1)"
          if [ -n "$GENERATOR" ]; then
            ln -sf "$GENERATOR" ~/.config/systemd/user-generators/podman-system-generator
            echo "Linked generator: $GENERATOR"
          else
            echo "WARNING: podman-system-generator not found in Nix store"
          fi

      - name: Verify podman
        run: nix develop -c podman --version

      - name: Run integration tests
        run: nix develop -c pytest -v -m integration --timeout=120

name: Sync Wiki

on:
  push:
    branches: [main]
    paths: [docs/**]
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Clone wiki
        run: git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki

      - name: Sync docs to wiki
        run: |
          # Remove existing wiki content (keep .git)
          find wiki -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # Copy docs contents into wiki root
          cp -r docs/* wiki/

          # Commit and push
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync docs from ${{ github.sha }}"
          git push

      - name: Cleanup
        if: always()
        run: rm -rf wiki

name: Regenerate Models

on:
  schedule:
    - cron: "0 0 * * 0" # weekly on Sunday at midnight UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "schema.json"
      - "compose_spec/models.py"
      - "pyproject.toml"

permissions:
  contents: write

jobs:
  check-and-regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download latest compose-spec.json
        run: curl -o https://raw.githubusercontent.com/compose-spec/compose-go/refs/heads/main/schema/compose-spec.json
        
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install datamodel-code-generator
        run: pip install datamodel-code-generator

      - name: Regenerate models
        run: datamodel-codegen

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet compose_spec/models.py; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Models are up to date ✓"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Models have changed:"
            git diff --stat compose_spec/models.py
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          title: "chore: regenerate compose_spec/models.py"
          body: |
            Auto-generated by the `regenerate-models` workflow.

            The compose-spec JSON schema has changed and the pydantic models
            need to be regenerated via `datamodel-codegen`.
          commit-message: "chore: regenerate compose_spec/models.py"
          branch: chore/regenerate-models
          delete-branch: true
          labels: automated
